name: Android Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: flashlight13/godot:4.2.1
      options: --user root
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y \
            openjdk-17-jdk \
            libc6 \
            libstdc++6 \
            zlib1g \
            wget \
            unzip

      - name: Set up Java
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3.1.0

      - name: Install SDK and templates
        run: |
          ln -s /usr/bin/godot /godot
          ANDROID_HOME="$ANDROID_SDK_ROOT"
          
          yes | "$ANDROID_HOME/cmdline-tools/11.0/bin/sdkmanager" \
            "platforms;android-33" \
            "build-tools;33.0.0" \
            --sdk_root="$ANDROID_HOME" 2>&1 | tail -3
          
          mkdir -p "$HOME/.local/share/godot"
          
          wget -q --timeout=60 --tries=3 \
            https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz \
            -O /tmp/godot_templates.tpz || \
          wget -q --timeout=60 --tries=3 \
            https://downloads.tuxfamily.org/godotengine/4.2.1/Godot_v4.2.1-stable_export_templates.tpz \
            -O /tmp/godot_templates.tpz
          
          cd /tmp && unzip -q godot_templates.tpz && rm -f godot_templates.tpz
          mkdir -p "$HOME/.local/share/godot/export_templates"
          cp -r templates "$HOME/.local/share/godot/export_templates/4.2.1.stable"
          
          mkdir -p "$GITHUB_WORKSPACE/android/build"
          cp "$HOME/.local/share/godot/export_templates/4.2.1.stable/android_source.zip" /tmp/
          cd /tmp && unzip -q android_source.zip -d "$GITHUB_WORKSPACE/android/build/"
          rm -f android_source.zip
          
          echo '' | base64 -d > "$GITHUB_WORKSPACE/export_presets.cfg"
          
          keytool -genkey -v -keystore "$GITHUB_WORKSPACE/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          
          echo "All setup complete"
          ls "$GITHUB_WORKSPACE/android/build/" | head -5

      - name: Export APK
        run: |
          cd "$GITHUB_WORKSPACE"
          echo "First pass: initialize assets..."
          godot --headless --export-debug Android tankfighter.apk --verbose 2>&1 || true
          echo "Second pass: actual export..."
          godot --headless --export-debug Android tankfighter.apk --verbose 2>&1
          EC=$?
          if [ $EC -ne 0 ]; then exit $EC; fi
          if [ ! -f tankfighter.apk ]; then
            echo "No APK produced after second pass"
            exit 1
          fi
          ls -la tankfighter.apk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: tankfighter-android-apk
          path: tankfighter.apk