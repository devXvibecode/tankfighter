name: Android Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: flashlight13/godot:4.4
      options: --user root
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      timeout-minutes: 30
      ANDROID_HOME: /github/home/.android/sdk
      HOME: /github/home

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y \
            openjdk-17-jdk \
            android-sdk-platform-tools-common \
            libc6 \
            libstdc++6 \
            zlib1g \
            wget \
            unzip \
            xvfb

      - name: Set up Java
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3.1.0

      - name: Install Android SDK components
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/11.0/bin/sdkmanager" \
            "platforms;android-33" \
            "build-tools;33.0.0" \
            --sdk_root="$ANDROID_HOME" 2>&1 | tail -5

      - name: Prepare Android project
        run: |
          ln -s /usr/bin/godot /godot
          
          echo "Downloading export templates..."
          wget -q --timeout=60 --tries=3 \
            https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_export_templates.tpz \
            -O /tmp/godot_templates.tpz || \
          wget -q --timeout=60 --tries=3 \
            https://downloads.tuxfamily.org/godotengine/4.4/Godot_v4.4-stable_export_templates.tpz \
            -O /tmp/godot_templates.tpz
          
          if [ ! -f /tmp/godot_templates.tpz ]; then
            echo "ERROR: Failed to download"
            exit 1
          fi
          
          cd /tmp && unzip -q godot_templates.tpz && rm -f godot_templates.tpz
          if [ ! -d templates ]; then
            echo "ERROR: templates dir not found"
            exit 1
          fi
          
          mkdir -p "$HOME/.local/share/godot/export_templates"
          cp -r templates "$HOME/.local/share/godot/export_templates/4.4.stable"
          
          echo "Global templates installed at $HOME/.local/share/godot/export_templates/4.4.stable/"
          ls "$HOME/.local/share/godot/export_templates/4.4.stable/" | head -5

      - name: Generate config files
        run: |
          echo '' | base64 -d > "$GITHUB_WORKSPACE/export_presets.cfg"
          
          keytool -genkey -v -keystore "$GITHUB_WORKSPACE/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          
          head -3 "$GITHUB_WORKSPACE/export_presets.cfg"
          ls -la "$GITHUB_WORKSPACE/debug.keystore"

      - name: Import project assets
        run: |
          cd "$GITHUB_WORKSPACE"
          echo "Pre-importing assets via editor init..."
          xvfb-run --auto-servernum godot --headless --editor --quit --verbose 2>&1 || true
          echo "Assets initialized"

      - name: Export Android APK
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd "$GITHUB_WORKSPACE"
          
          if [ -n "$ANDROID_KEYSTORE" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "$ANDROID_KEYSTORE" | base64 -d > /tmp/release.keystore
            godot --headless --export-release Android tankfighter.apk --verbose 2>&1
          else
            godot --headless --export-debug Android tankfighter.apk --verbose 2>&1
          fi
          
          EC=$?
          echo "Exit code: $EC"
          if [ $EC -ne 0 ]; then
            echo "Export failed"
            exit $EC
          fi
          if [ ! -f tankfighter.apk ]; then
            echo "No APK produced"
            ls -la
            exit 1
          fi
          ls -la tankfighter.apk

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: tankfighter-android-apk
          path: tankfighter.apk