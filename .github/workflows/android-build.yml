name: Android Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # Using flashlight13/godot image (official Godot Docker build)
      image: flashlight13/godot:4.2.1
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y \
            openjdk-17-jdk \
            android-sdk-platform-tools \
            libc6 \
            libstdc++6 \
            zlib1g \
            wget \
            unzip

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.0

      - name: Setup Godot Android Export Templates
        run: |
          # Create debug keystore if it doesn't exist (needed for export)
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # Link Godot executable
          ln -s /usr/bin/godot /godot

      - name: Export Android Project
        env:
          # These secrets need to be set in the repository settings
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # If we have release keystore secrets, use them
          if [ -n "$ANDROID_KEYSTORE" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "Setting up release keystore..."
            echo "$ANDROID_KEYSTORE" | base64 -d > /tmp/release.keystore
            
            # Export release build
            godot --headless --export-release Android tankfighter.apk \
              --verbose
          else
            echo "No release keystore provided, exporting debug APK..."
            # Export debug build (uses default debug.keystore)
            godot --headless --export-debug Android tankfighter.apk \
              --verbose
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tankfighter-android-apk
          path: tankfighter.apk