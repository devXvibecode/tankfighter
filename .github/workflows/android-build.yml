name: Android Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # Using flashlight13/godot image (official Godot Docker build)
      image: flashlight13/godot:4.2.1
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y \
            openjdk-17-jdk \
            android-sdk-platform-tools \
            libc6 \
            libstdc++6 \
            zlib1g

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Export Android Project
        env:
          # These secrets need to be set in the repository settings
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # If keystore secrets are provided, use them for release build
          if [ -n "$ANDROID_KEYSTORE" ]; then
            echo "Setting up release keystore..."
            echo "$ANDROID_KEYSTORE" | base64 -d > /tmp/keystore.jks
            godot --headless --export-debug Android /godot/tankfighter.apk \
              --export-debug-template \
              --path /godot/tankfighter \
              --verbose
          else
            echo "No keystore provided, exporting debug APK..."
            godot --headless --export-debug Android /godot/tankfighter.apk \
              --path /godot/tankfighter \
              --verbose
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tankfighter-android-apk
          path: /godot/tankfighter.apk