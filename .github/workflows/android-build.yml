name: Android Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: flashlight13/godot:4.2.1
      options: --user root
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y \
            openjdk-17-jdk \
            android-sdk-platform-tools \
            libc6 \
            libstdc++6 \
            zlib1g \
            wget \
            unzip

      - name: Set up Java
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3.1.0
        with:
          api-level: 33
          build-tools: 33.0.0

      - name: Setup Godot and Export Templates
        run: |
          ln -s /usr/bin/godot /godot
          
          echo "Generating export_presets.cfg..."
          cat > "$GITHUB_WORKSPACE/export_presets.cfg" << 'CFGEOF'
[preset.0]

name="Android"
platform="Android"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="tankfighter.apk"
patches/Patch.0.enabled=false
patches/Patch.0.name="Patch 0"
patches/Patch.0.version="1.0"

[preset.0.options]

custom_package/debug=""
custom_package/release=""
apk_expansion/enable=false
apk_expansion/S3_region=""
apk_expansion/S3_bucket=""
apk_expansion/S3_access_key=""
apk_expansion/S3_secret_key=""
command_line=""
gradle_build/use_gradle_build=true
gradle_build/export_format=0
gradle_build/min_sdk_version="21"
gradle_build/target_sdk_version="33"
gradle_build/number_of_abis=2
gradle_build/force_system_certs=false
versions/linux_debian_arm64=false
versions/linux_debian_arm32=false
versions/linux_x86_64=false
versions/windows_x86_64=false
versions/macos=false
versions/android=true
keystore/debug="res://debug.keystore"
keystore/release=""
keystore/debug_password="android"
keystore/release_password=""
keystore/debug_user="androiddebugkey"
keystore/release_user=""
version/code=1
version/name="1.0"
package/unique_name="org.godotengine.tankfighter"
package/signed=true
screen/immersive_mode=true
screen/orientation="portrait"
screen/handheld=true
screen/tablet=false
screen/tv=false
CFGEOF
          echo "export_presets.cfg created"
          ls -la "$GITHUB_WORKSPACE/export_presets.cfg"
          
          echo "Setting up Godot export templates..."
          mkdir -p "$HOME/.local/share/godot/templates"
          
          echo "Downloading export templates from GitHub releases..."
          wget -q --timeout=60 --tries=3 \
            https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz \
            -O /tmp/godot_templates.tpz
          
          if [ ! -f /tmp/godot_templates.tpz ]; then
            echo "Failed to download from GitHub, trying mirror..."
            wget -q --timeout=60 --tries=3 \
              https://downloads.tuxfamily.org/godotengine/4.2.1/Godot_v4.2.1-stable_export_templates.tpz \
              -O /tmp/godot_templates.tpz
          fi
          
          if [ ! -f /tmp/godot_templates.tpz ]; then
            echo "ERROR: Failed to download export templates"
            exit 1
          fi
          
          echo "Extracting templates..."
          cd /tmp
          unzip -q godot_templates.tpz
          rm -f godot_templates.tpz
          
          if [ -d templates ]; then
            mv templates "$HOME/.local/share/godot/templates/4.2.1.stable"
          else
            echo "ERROR: Unexpected archive structure"
            ls -la /tmp/
            exit 1
          fi
          
          echo "Export templates installed successfully"
          ls -la "$HOME/.local/share/godot/templates/4.2.1.stable"

      - name: Generate debug keystore
        run: |
          echo "Generating Android debug keystore..."
          keytool -genkey -v -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          ls -la debug.keystore

      - name: Export Android Project (Debug)
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "Starting Android export..."
          set +e
          
          if [ -n "$ANDROID_KEYSTORE" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "Using release keystore..."
            echo "$ANDROID_KEYSTORE" | base64 -d > /tmp/release.keystore
            godot --headless --export-release Android tankfighter.apk --verbose 2>&1
          else
            echo "Using debug export..."
            godot --headless --export-debug Android tankfighter.apk --verbose 2>&1
          fi
          
          EXIT_CODE=$?
          set -e
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR: Godot export failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          
          echo "Export command completed"

      - name: List files after export
        run: |
          echo "=== POST-EXPORT FILE LISTING ==="
          find . -type f | sort
          echo "=== APK FILES ==="
          find . -name "*.apk" -type f || echo "No APK files found"

      - name: Check for APK and upload
        id: upload_check
        run: |
          APK_FILE=$(find . -name "*.apk" -type f | head -1)
          if [ -n "$APK_FILE" ]; then
            echo "Found APK: $APK_FILE"
            echo "apk_path=$APK_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "No APK file found"
            echo "apk_path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APK as artifact
        if: steps.upload_check.outputs.apk_path != ''
        uses: actions/upload-artifact@v4.4.3
        with:
          name: tankfighter-android-apk
          path: ${{ steps.upload_check.outputs.apk_path }}

      - name: Report missing APK
        if: steps.upload_check.outputs.apk_path == ''
        run: |
          echo "ERROR: No APK file found to upload"
          echo "Please check the export logs above for errors"
          exit 1