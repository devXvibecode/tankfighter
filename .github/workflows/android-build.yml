name: Android Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.1
      options: --user root
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.1.0

      - name: Install SDK components
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-33" \
            "build-tools;33.0.0" 2>&1 | tail -5

      - name: Setup and Export APK
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          
          echo '' | base64 -d > export_presets.cfg
          
          godot --headless --export-debug Android tankfighter.apk --verbose 2>&1
          
          if [ -f tankfighter.apk ]; then
            ls -la tankfighter.apk
          else
            ls -la
            exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: tankfighter-android-apk
          path: tankfighter.apk