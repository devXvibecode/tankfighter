name: Android Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup
        run: |
          sudo apt-get update && sudo apt-get install -y \
            openjdk-17-jdk \
            wget unzip xvfb

      - name: Set up Java
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Godot and Android SDK
        run: |
          curl -fsSL -o /tmp/godot.zip \
            https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux.x86_64.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo cp /tmp/godot/Godot_v4.2.1-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          
          curl -fsSL -o /tmp/godot_templates.tpz \
            https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz
          cd /tmp && unzip -q godot_templates.tpz && rm -f godot_templates.tpz
          mkdir -p "$HOME/.local/share/godot/export_templates"
          mv templates "$HOME/.local/share/godot/export_templates/4.2.1.stable"
          
          curl -fsSL -o /tmp/cmdline-tools.zip \
            https://dl.google.com/android/repository/commandlinetools-linux-10406996_latest.zip
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          unzip -q /tmp/cmdline-tools.zip -d /tmp/
          mv /tmp/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
          
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-33" \
            "build-tools;33.0.0" 2>&1 | tail -3
          echo "Setup complete"

      - name: Export APK
        run: |
          cd "$GITHUB_WORKSPACE"
          
          keytool -genkey -v -keystore debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          
          echo '' | base64 -d > export_presets.cfg
          
          echo "Pre-importing assets..."
          xvfb-run -a godot --editor --quit --headless --verbose 2>&1 || true
          
          echo "Exporting APK (first attempt)..."
          xvfb-run -a godot --headless --export-debug Android tankfighter.apk --verbose 2>&1 || true
          
          if [ -f tankfighter.apk ]; then
            echo "APK found!"; ls -la tankfighter.apk; exit 0
          fi
          
          echo "Exporting APK (second attempt)..."
          xvfb-run -a godot --headless --export-debug Android tankfighter.apk --verbose 2>&1
          
          if [ -f tankfighter.apk ]; then
            echo "APK found!"; ls -la tankfighter.apk
          else
            echo "No APK produced"; exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: tankfighter-android-apk
          path: tankfighter.apk