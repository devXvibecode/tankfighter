name: Android Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: flashlight13/godot:4.2.1
      options: --user root
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y \
            openjdk-17-jdk \
            android-sdk-platform-tools \
            libc6 \
            libstdc++6 \
            zlib1g \
            wget \
            unzip

      - name: Set up Java
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3.1.0
        with:
          api-level: 33
          build-tools: 33.0.0

      - name: Setup Godot and Export Templates
        run: |
          ln -s /usr/bin/godot /godot
          mkdir -p "$HOME/.local/share/godot/templates"
          wget -q --timeout=60 --tries=3 \
            https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_export_templates.tpz \
            -O /tmp/godot_templates.tpz || \
          wget -q --timeout=60 --tries=3 \
            https://downloads.tuxfamily.org/godotengine/4.2.1/Godot_v4.2.1-stable_export_templates.tpz \
            -O /tmp/godot_templates.tpz
          if [ ! -f /tmp/godot_templates.tpz ]; then
            echo "ERROR: Failed to download export templates"
            exit 1
          fi
          cd /tmp && unzip -q godot_templates.tpz && rm -f godot_templates.tpz
          if [ -d templates ]; then
            mv templates "$HOME/.local/share/godot/templates/4.2.1.stable"
          else
            echo "ERROR: Unexpected archive structure"
            exit 1
          fi
          echo "Export templates installed"
          ls -la "$HOME/.local/share/godot/templates/4.2.1.stable"

      - name: Generate export_presets.cfg
        run: |
          echo '' | base64 -d > "$GITHUB_WORKSPACE/export_presets.cfg"
          echo "export_presets.cfg created"
          head -5 "$GITHUB_WORKSPACE/export_presets.cfg"

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          ls -la debug.keystore

      - name: Export Android Project (Debug)
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "Starting Android export..."
          if [ -n "$ANDROID_KEYSTORE" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "Using release keystore..."
            echo "$ANDROID_KEYSTORE" | base64 -d > /tmp/release.keystore
            godot --headless --export-release Android "$GITHUB_WORKSPACE/tankfighter.apk" --verbose 2>&1
          else
            echo "Using debug export..."
            godot --headless --export-debug Android "$GITHUB_WORKSPACE/tankfighter.apk" --verbose 2>&1
          fi
          EXIT_CODE=$?
          echo "Godot exit code: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR: Godot export failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          if [ -f "$GITHUB_WORKSPACE/tankfighter.apk" ]; then
            echo "APK found at $GITHUB_WORKSPACE/tankfighter.apk"
            ls -la "$GITHUB_WORKSPACE/tankfighter.apk"
          elif [ -f "tankfighter.apk" ]; then
            echo "APK found in CWD"
            ls -la tankfighter.apk
          else
            echo "APK not found. Searching..."
            find "$GITHUB_WORKSPACE" -name "*.apk" -type f 2>/dev/null || echo "No APK in workspace"
            echo "ERROR: No APK was produced"
            exit 1
          fi
          echo "Export completed successfully"

      - name: Check for APK and upload
        id: upload_check
        run: |
          APK_FILE=$(find . -name "*.apk" -type f | head -1)
          if [ -n "$APK_FILE" ]; then
            echo "Found APK: $APK_FILE"
            echo "apk_path=$APK_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "No APK file found"
            echo "apk_path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APK as artifact
        if: steps.upload_check.outputs.apk_path != ''
        uses: actions/upload-artifact@v4.4.3
        with:
          name: tankfighter-android-apk
          path: ${{ steps.upload_check.outputs.apk_path }}

      - name: Report missing APK
        if: steps.upload_check.outputs.apk_path == ''
        run: |
          echo "ERROR: No APK file found to upload"
          exit 1